<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>Doctors Management</title>

    <style>
      body {
        font-family: Arial;
        margin: 20px;
        background: #f4f4f4;
      }

      h2 {
        text-align: center;
      }

      .box {
        background: white;
        padding: 15px;
        margin-bottom: 20px;
      }

      input {
        padding: 8px;
        margin: 5px;
      }

      button {
        padding: 8px 12px;
        background:  rgb(34, 101, 121);;
        color: white;
        border: none;
        cursor: pointer;
      }

      .update {
        background: blue;
      }

      .delete {
        background: red;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
      }

      th {
        background: #333;
        color: white;
      }
    </style>
  </head>

  <body>
    <script src="navbar.js"></script>

    <h2>Doctor Management System</h2>

    <div class="box">
      <h3>Search Doctor</h3>

      <input id="searchDoctor" placeholder="Enter Doctor Name or ID" />

      <button onclick="searchDoctor()">Search</button>

      <button onclick="loadDoctors()">Show All</button>

      <h3>Add Doctor</h3>

      <input id="name" placeholder="Doctor Name" />

      <input id="specialization" placeholder="Specialization" />

      <input id="phone" placeholder="Phone" />

      <input id="email" placeholder="Email" />

      <input id="hospital" placeholder="Hospital ID" />

      <button onclick="addDoctor()">Add Doctor</button>
    </div>

    <div class="box" id="updateBox" style="display: none">
      <h3>Update Doctor</h3>

      <input id="updateName" placeholder="New Name" />

      <input id="updateSpec" placeholder="New Specialization" />

      <input id="updatePhone" placeholder="New Phone" />

      <input id="updateEmail" placeholder="New Email" />

      <button onclick="saveUpdate()">Save Update</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>

          <th>Name</th>

          <th>Specialization</th>

          <th>Phone</th>

          <th>Email</th>

          <th>Hospital ID</th>

          <th>Action</th>
        </tr>
      </thead>

      <tbody id="tableData"></tbody>
    </table>

    <script>
      const API = "http://localhost:5000/doctors";

      let selectedDoctor = null;

      // LOAD

      async function loadDoctors() {
        const res = await fetch(API);

        const data = await res.json();

        displayDoctors(data);
      }

      // DISPLAY

      function displayDoctors(data) {
        let rows = "";

        data.forEach((d) => {
          rows += `

<tr>


<td>${d.doctor_id}</td>

<td>${d.doctor_name}</td>

<td>${d.specialization}</td>

<td>${d.phone}</td>

<td>${d.email}</td>

<td>${d.hospital_id}</td>


<td>


<button class="update"

onclick="updateDoctor(${d.doctor_id})">

Update

</button>



<button class="delete"

onclick="deleteDoctor(${d.doctor_id})">

Delete

</button>


</td>


</tr>


`;
        });

        document.getElementById("tableData").innerHTML = rows;
      }

      // ADD

      async function addDoctor() {
        const doctor = {
          doctor_name: document.getElementById("name").value,

          specialization: document.getElementById("specialization").value,

          phone: document.getElementById("phone").value,

          email: document.getElementById("email").value,

          hospital_id: document.getElementById("hospital").value,
        };

        await fetch(API, {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify(doctor),
        });

        alert("Doctor Added");

        // clear fields

        document.getElementById("name").value = "";

        document.getElementById("specialization").value = "";

        document.getElementById("phone").value = "";

        document.getElementById("email").value = "";

        document.getElementById("hospital").value = "";

        loadDoctors();
      }

      // SEARCH

      async function searchDoctor() {
        let value = document.getElementById("searchDoctor").value;

        const res = await fetch(API + "/search/" + encodeURIComponent(value));

        const data = await res.json();

        displayDoctors(data);

        document.getElementById("searchDoctor").value = "";
      }

      // DELETE

      async function deleteDoctor(id) {
        await fetch(API + "/" + id, {
          method: "DELETE",
        });

        alert("Doctor Deleted");

        loadDoctors();
      }

      // OPEN UPDATE BOX

      function updateDoctor(id) {
        selectedDoctor = id;

        document.getElementById("updateBox").style.display = "block";
      }

      // SAVE UPDATE

      async function saveUpdate() {
        await fetch(API + "/" + selectedDoctor, {
          method: "PUT",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            doctor_name: document.getElementById("updateName").value,

            specialization: document.getElementById("updateSpec").value,

            phone: document.getElementById("updatePhone").value,

            email: document.getElementById("updateEmail").value,
          }),
        });

        document.getElementById("updateName").value = "";

        document.getElementById("updateSpec").value = "";

        document.getElementById("updatePhone").value = "";

        document.getElementById("updateEmail").value = "";

        document.getElementById("updateBox").style.display = "none";

        alert("Doctor Updated");

        loadDoctors();
      }
    </script>
  </body>
  </div>
</html>
