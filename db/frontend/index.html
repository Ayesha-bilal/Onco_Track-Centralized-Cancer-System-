<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <title>OncoTrack Dashboard</title>

    <script src="navbar.js"></script>

    <style>
      body {
        font-family: Arial;
        background: #f2f2f2;
        text-align: center;
      }

      .card {
        display: inline-block;
        background: white;
        padding: 20px;
        margin: 15px;
        width: 180px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px #ccc;
      }

      h1 {
        margin-top: 20px;
      }

      .number {
        font-size: 30px;
        font-weight: bold;
        color: green;
      }
    </style>
  </head>

  <body>
    <h1>OncoTrack Dashboard</h1>

    <div class="card">
      <h3>Patients</h3>
      <div id="patients" class="number">0</div>
    </div>

    <div class="card">
      <h3>Doctors</h3>
      <div id="doctors" class="number">0</div>
    </div>

    <div class="card">
      <h3>Hospitals</h3>
      <div id="hospitals" class="number">0</div>
    </div>

    <div class="card">
      <h3>Diagnosis</h3>
      <div id="diagnosis" class="number">0</div>
    </div>

    <div class="card">
      <h3>Treatments</h3>
      <div id="treatments" class="number">0</div>
    </div>

    <script>
      async function loadDashboard() {
        const res = await fetch("http://localhost:5000/dashboard");
        const data = await res.json();

        document.getElementById("patients").innerText = data.patients;
        document.getElementById("doctors").innerText = data.doctors;
        document.getElementById("hospitals").innerText = data.hospitals;
        document.getElementById("diagnosis").innerText = data.diagnosis;
        document.getElementById("treatments").innerText = data.treatments;
      }

      loadDashboard();
    </script>
    </div>
  </body>
</html>
